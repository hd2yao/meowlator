services:
  mysql:
    image: mysql:8.4
    container_name: meowlator-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meowlator
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: meowlator-redis
    ports:
      - "6379:6379"

  inference:
    build:
      context: ../services/inference
      dockerfile: Dockerfile
    container_name: meowlator-inference
    environment:
      INFERENCE_ADDR: ":8081"
      INFERENCE_PREDICTOR_MODE: "heuristic"
      MODEL_PRIORS_PATH: ""
      INFERENCE_UPLOAD_ROOT: "/tmp/meowlator/uploads"
    ports:
      - "8081:8081"
    volumes:
      - uploads_data:/tmp/meowlator/uploads

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: meowlator-api
    restart: on-failure
    environment:
      API_ADDR: ":8080"
      INFERENCE_URL: "http://inference:8081"
      MYSQL_DSN: "root:root@tcp(mysql:3306)/meowlator?parseTime=true&charset=utf8mb4"
      REDIS_ADDR: "redis:6379"
      DEFAULT_RETENTION_DAYS: "7"
      EDGE_ACCEPT_THRESHOLD: "0.7"
      CLOUD_FALLBACK_THRESHOLD: "0.45"
      MODEL_VERSION: "mobilenetv3-small-int8-v1"
      PAIN_RISK_ENABLED: "false"
      EDGE_DEVICE_WHITELIST: "iPhone15,Android"
      RATE_LIMIT_PER_USER_MIN: "120"
      RATE_LIMIT_PER_IP_MIN: "300"
      ADMIN_TOKEN: "dev-admin-token"
      WHITELIST_ENABLED: "false"
      WHITELIST_USERS: ""
      WHITELIST_DAILY_QUOTA: "100"
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/tmp/meowlator/uploads
    depends_on:
      inference:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: meowlator-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: meowlator-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--config.expand-env"
    environment:
      ALERT_WEBHOOK_URL: "http://127.0.0.1:19093/alert"
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    container_name: meowlator-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  mysql_data:
  uploads_data:
  prometheus_data:
  grafana_data:
