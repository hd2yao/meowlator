global:
  resolve_timeout: 5m

route:
  group_by:
    - alertname
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - receiver: webhook
      continue: true
      matchers:
        - severity="critical"

receivers:
  - name: default
  - name: webhook
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true
