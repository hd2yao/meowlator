name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test API
        run: cd services/api && go test ./...
      - name: Test Inference
        run: cd services/inference && go test ./...

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run training unit tests
        run: cd ml/training && python -m unittest discover -s scripts -p 'test_*.py'
